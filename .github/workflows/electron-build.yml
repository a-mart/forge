# Electron desktop app build workflow.
# - Manual trigger (workflow_dispatch): builds Windows artifacts and uploads them for testing. No release created.
# - Tag push (v*): builds Windows artifacts and creates a draft GitHub Release with installers attached.
# - Branch push (electron/*): Windows validation build only.
# - macOS builds (signed + notarized) are performed locally on a developer machine.

name: Electron Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'electron/*'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package Electron
        run: pnpm package:electron

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.platform }}
          path: apps/electron/release/**
          if-no-files-found: error

  draft-release:
    name: Draft GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: forge-*
          merge-multiple: true
          path: release-artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-artifacts/**/*
