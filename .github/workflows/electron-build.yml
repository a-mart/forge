# Electron desktop app Windows build workflow.
# - Manual trigger (workflow_dispatch): release-path Windows artifact build.
# - Branch push (electron/*): validation-only Windows build for release branches.
# - This workflow does not publish GitHub Releases; operators create a draft release separately
#   and upload the full updater asset set after macOS and Windows artifacts are both validated.
# - macOS builds (signed + notarized) are performed locally on a developer machine.

name: Electron Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'electron/*'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package Electron
        run: pnpm package:electron

      - name: Derive Electron version
        id: electron_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(node -p 'require("./apps/electron/package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Validate Windows release artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.electron_version.outputs.version }}"
          RELEASE_DIR="apps/electron/release"
          EXPECTED_INSTALLER="Forge-Setup-${VERSION}.exe"
          EXPECTED_BLOCKMAP="${EXPECTED_INSTALLER}.blockmap"
          EXPECTED_MANIFEST="latest.yml"

          mapfile -t EXE_FILES < <(find "$RELEASE_DIR" -maxdepth 1 -type f -name '*.exe' -exec basename {} \; | sort)
          mapfile -t BLOCKMAP_FILES < <(find "$RELEASE_DIR" -maxdepth 1 -type f -name '*.exe.blockmap' -exec basename {} \; | sort)
          mapfile -t MANIFEST_FILES < <(find "$RELEASE_DIR" -maxdepth 1 -type f -name 'latest.yml' -exec basename {} \; | sort)

          if [[ ${#EXE_FILES[@]} -ne 1 || "${EXE_FILES[0]}" != "$EXPECTED_INSTALLER" ]]; then
            echo "[electron-build] expected exactly $EXPECTED_INSTALLER, found: ${EXE_FILES[*]:-<none>}" >&2
            exit 1
          fi

          if [[ ${#BLOCKMAP_FILES[@]} -ne 1 || "${BLOCKMAP_FILES[0]}" != "$EXPECTED_BLOCKMAP" ]]; then
            echo "[electron-build] expected exactly $EXPECTED_BLOCKMAP, found: ${BLOCKMAP_FILES[*]:-<none>}" >&2
            exit 1
          fi

          if [[ ${#MANIFEST_FILES[@]} -ne 1 || "${MANIFEST_FILES[0]}" != "$EXPECTED_MANIFEST" ]]; then
            echo "[electron-build] expected exactly one $EXPECTED_MANIFEST, found: ${MANIFEST_FILES[*]:-<none>}" >&2
            exit 1
          fi

          node apps/electron/scripts/validate-updater-manifest.mjs \
            --manifest "$RELEASE_DIR/$EXPECTED_MANIFEST" \
            --platform windows \
            --version "$VERSION" \
            --asset-root "$RELEASE_DIR" \
            --label "[electron-build]"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.platform }}
          path: |
            apps/electron/release/Forge-Setup-${{ steps.electron_version.outputs.version }}.exe
            apps/electron/release/Forge-Setup-${{ steps.electron_version.outputs.version }}.exe.blockmap
            apps/electron/release/latest.yml
          if-no-files-found: error


