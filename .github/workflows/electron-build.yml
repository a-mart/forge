name: Electron Build

on:
  push:
    branches:
      - 'electron/*'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: macos-arm64
          - runner: windows-latest
            platform: windows-x64
          - runner: ubuntu-latest
            platform: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package Electron (signed macOS tag build)
        if: matrix.runner == 'macos-14' && startsWith(github.ref, 'refs/tags/v')
        run: pnpm package:electron
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package Electron (unsigned)
        if: matrix.runner != 'macos-14' || !startsWith(github.ref, 'refs/tags/v')
        run: pnpm package:electron

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.platform }}
          path: apps/electron/release/**
          if-no-files-found: error

  draft-release:
    name: Draft GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: forge-*
          merge-multiple: true
          path: release-artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-artifacts/**/*
