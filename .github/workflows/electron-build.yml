# Electron desktop app build workflow.
# - Manual trigger (workflow_dispatch): builds Windows artifacts and uploads them.
#   The release script (electron-release skill) triggers this and handles GitHub Release creation.
# - Branch push (electron/*): Windows validation build only.
# - macOS builds (signed + notarized) are performed locally on a developer machine.

name: Electron Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'electron/*'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Package Electron
        run: pnpm package:electron

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-${{ matrix.platform }}
          path: apps/electron/release/**
          if-no-files-found: error


